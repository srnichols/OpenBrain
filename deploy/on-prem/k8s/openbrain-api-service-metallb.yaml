apiVersion: v1
kind: Service
metadata:
  name: openbrain-api-external
  namespace: openbrain
  labels:
    app: openbrain-api
  annotations:
    # Assign a static IP from your MetalLB pool
    # Adjust this IP to an available address in your 192.168.x.x range
    metallb.universe.tf/loadBalancerIPs: "192.168.x.x"
spec:
  type: LoadBalancer
  ports:
  - name: api
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: mcp
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: openbrain-api
  externalTrafficPolicy: Local
