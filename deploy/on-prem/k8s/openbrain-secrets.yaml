# ============================================================================
# SECURITY WARNING: This is a TEMPLATE file for secrets
# DO NOT commit actual secrets to Git
# ============================================================================
#
# Usage:
# 1. Copy this file to openbrain-secrets-actual.yaml
# 2. Replace <BASE64_ENCODED_VALUE> placeholders with actual base64-encoded values
# 3. Add openbrain-secrets-actual.yaml to .gitignore
# 4. Apply: kubectl apply -f k8s/openbrain-secrets-actual.yaml
#
# To base64 encode values in PowerShell:
# [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("your-secret-value"))
#
# To base64 encode values in Bash:
# echo -n "your-secret-value" | base64
#
# Generate MCP access key:
# openssl rand -hex 32
# PowerShell: -join ((1..32) | ForEach-Object { '{0:x2}' -f (Get-Random -Maximum 256) })
# ============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: openbrain-secrets
  namespace: openbrain
  labels:
    app: openbrain
type: Opaque
data:
  # PostgreSQL password for the openbrain database user
  postgres-password: <BASE64_ENCODED_VALUE>

  # MCP Access Key (64-character hex string)
  # Used by AI clients to authenticate with the MCP server
  mcp-access-key: <BASE64_ENCODED_VALUE>

  # OpenRouter API Key (optional, only if using OpenRouter instead of Ollama)
  # Format: sk-or-...
  # openrouter-api-key: <BASE64_ENCODED_VALUE>

  # Slack Bot Token (optional, only if using Slack capture)
  # Format: xoxb-...
  # slack-bot-token: <BASE64_ENCODED_VALUE>

  # Slack Capture Channel ID (optional)
  # Format: C0123456789
  # slack-channel-id: <BASE64_ENCODED_VALUE>
