apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbrain-api
  namespace: openbrain
  labels:
    app: openbrain-api
    component: api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openbrain-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: openbrain-api
        component: api
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: openbrain-api
        image: your-registry.azurecr.io/openbrain/api:latest
        imagePullPolicy: Always
        ports:
        - name: api
          containerPort: 8000
          protocol: TCP
        - name: mcp
          containerPort: 8080
          protocol: TCP
        env:
        # Database
        - name: DB_HOST
          value: "openbrain-postgres.openbrain.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "openbrain"
        - name: DB_USER
          value: "openbrain"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: openbrain-secrets
              key: postgres-password

        # Ollama (cross-namespace, using existing Ollama deployment)
        - name: OLLAMA_ENDPOINT
          value: "http://ollama-gpu-bridge.your-namespace.svc.cluster.local:11434"
        - name: OLLAMA_EMBED_MODEL
          value: "nomic-embed-text"
        - name: OLLAMA_LLM_MODEL
          value: "llama3.2"
        - name: EMBEDDING_DIMENSIONS
          value: "768"

        # Embedder provider: "ollama" (local) or "openrouter" (cloud)
        - name: EMBEDDER_PROVIDER
          value: "ollama"

        # MCP Authentication
        - name: MCP_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: openbrain-secrets
              key: mcp-access-key

        # Application
        - name: API_HOST
          value: "0.0.0.0"
        - name: API_PORT
          value: "8000"
        - name: MCP_HOST
          value: "0.0.0.0"
        - name: MCP_PORT
          value: "8080"
        - name: LOG_LEVEL
          value: "info"

        # Optional: OpenRouter (if EMBEDDER_PROVIDER=openrouter)
        # - name: OPENROUTER_API_KEY
        #   valueFrom:
        #     secretKeyRef:
        #       name: openbrain-secrets
        #       key: openrouter-api-key

        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - openbrain-api
              topologyKey: kubernetes.io/hostname

      imagePullSecrets:
      - name: acr-pull-secret
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: openbrain-api
  namespace: openbrain
  labels:
    app: openbrain-api
spec:
  type: ClusterIP
  ports:
  - name: api
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: mcp
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: openbrain-api
